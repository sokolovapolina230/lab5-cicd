<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team 8</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrap">

    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>

    <div class="content">
      <div class="team-title">Team 8</div>

      <div class="carousel-wrap">
        <button class="carousel-btn" id="prev">&#8592;</button>
        <div class="carousel-card" id="card">
          <div class="member-name" id="name"></div>
        </div>
        <button class="carousel-btn" id="next">&#8594;</button>
      </div>

      <div class="dots" id="dots"></div>
    </div>

  </div>

  <script>
    const members = ["Варчук", "Соколова", "Шереметьєв", "New!"];
    let current = 0;
    let autoTimer;

    const nameEl = document.getElementById("name");
    const card   = document.getElementById("card");
    const dotsEl = document.getElementById("dots");

    members.forEach((_, i) => {
      const d = document.createElement("button");
      d.className = "dot" + (i === 0 ? " active" : "");
      d.onclick = () => { goTo(i); resetTimer(); };
      dotsEl.appendChild(d);
    });

    function updateDots() {
      document.querySelectorAll(".dot").forEach((d, i) => {
        d.className = "dot" + (i === current ? " active" : "");
      });
    }

    function goTo(index) {
      current = (index + members.length) % members.length;
      card.style.animation = "none";
      card.offsetWidth;
      card.style.animation = "slide-in 0.35s ease forwards";
      nameEl.textContent = members[current];
      updateDots();
    }

    function resetTimer() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(current + 1), 3000);
    }

    goTo(0);
    resetTimer();

    document.getElementById("prev").onclick = () => { goTo(current - 1); resetTimer(); };
    document.getElementById("next").onclick = () => { goTo(current + 1); resetTimer(); };
  </script>

</body>
</html>
